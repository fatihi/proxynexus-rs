name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        components: rustfmt, clippy

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        cache-bin: true

    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libxdo-dev clang

    - name: Check Formatting
      run: cargo fmt --all -- --check

    - name: Clippy
      run: cargo clippy -p proxynexus-core -p proxynexus-cli -p proxynexus-gui -- -D warnings

    - name: Check WASM compatibility
      run: cargo check --target wasm32-unknown-unknown -p proxynexus-core

    - name: Build packages
      run: cargo build -p proxynexus-core -p proxynexus-cli -p proxynexus-gui --verbose

    - name: Run tests
      run: cargo test -p proxynexus-core -p proxynexus-cli -p proxynexus-gui --verbose

    - name: Install cargo-binstall
      uses: cargo-bins/cargo-binstall@main

    - name: Install Dioxus CLI
      run: cargo binstall -y --force dioxus-cli

    - name: Cache Dioxus target directory
      uses: actions/cache@v4
      with:
        path: |
          target/dx
        key: dx-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          dx-${{ runner.os }}-

    - name: Clean Previous Build Assets
      run: rm -rf target/dx/proxynexus-gui/release/web

    - name: Build Web App
      run: dx build --release -p proxynexus-gui --platform web
      env:
        POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}

    - name: Upload Web App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-app
        path: target/dx/proxynexus-gui/release/web/public

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4

    - name: Download Web App Artifact
      uses: actions/download-artifact@v4
      with:
        name: web-app
        path: target/dx/proxynexus-gui/release/web/public

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy target/dx/proxynexus-gui/release/web/public --project-name=proxynexus