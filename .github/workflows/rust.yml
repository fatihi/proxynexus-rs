name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libturbojpeg0-dev nasm

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true

    - name: Clippy
      run: cargo clippy -- -D warnings

    - name: Check WASM compatibility
      run: cargo check --target wasm32-unknown-unknown -p proxynexus-core

    - name: Run tests
      run: cargo test --verbose

    - name: Install Dioxus CLI
      run: cargo install --locked --force dioxus-cli

    - name: Cache Dioxus target directory
      uses: actions/cache@v4
      with:
        path: |
          target/dx
        key: dx-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          dx-${{ runner.os }}-

    - name: Build Web App
      run: ~/.cargo/bin/dx build --release -p proxynexus-gui --platform web

    - name: Deploy to Cloudflare Pages
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy target/dx/proxynexus-gui/release/web/public --project-name=proxynexus